name: CASUALTIES_UNKNOWN_CUSTOM_TRANS_STAT_TRACK

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  traffic-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch and store traffic data
        uses: jgehrcke/github-repo-stats@main          # ← 就这里，v1 改成 main
        with:
          repository: ${{ github.repository }}
          ghtoken: ${{ secrets.STATS_TOKEN }}
