name: CASUALTIES_UNKNOWN_CUSTOM_TRANS_STAT_TRACK

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch data & generate dashboard
        env:
          TOKEN: ${{ secrets.STATS_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          python3 << 'PYEOF'
          import urllib.request
          import json
          import os
          import csv
          from datetime import date, datetime

          token = os.environ["TOKEN"]
          repo = os.environ["REPO"]
          today = date.today().isoformat()

          def fetch(endpoint):
              url = f"https://api.github.com/repos/{repo}/{endpoint}"
              req = urllib.request.Request(url, headers={
                  "Authorization": f"Bearer {token}",
                  "Accept": "application/vnd.github+json",
                  "User-Agent": "github-actions"
              })
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except Exception as e:
                  print(f"⚠️ Failed to fetch {endpoint}: {e}")
                  return None

          # ─── Fetch all data ───
          views_data = fetch("traffic/views")
          clones_data = fetch("traffic/clones")
          referrers = fetch("traffic/popular/referrers") or []
          paths = fetch("traffic/popular/paths") or []
          repo_info = fetch("")  # just /repos/{owner}/{repo}

          # ─── Extract values ───
          views_count = views_data.get("count", 0) if views_data else 0
          views_uniques = views_data.get("uniques", 0) if views_data else 0
          clones_count = clones_data.get("count", 0) if clones_data else 0
          clones_uniques = clones_data.get("uniques", 0) if clones_data else 0
          stars = repo_info.get("stargazers_count", 0) if repo_info else 0
          forks = repo_info.get("forks_count", 0) if repo_info else 0
          repo_name = repo_info.get("full_name", repo) if repo_info else repo
          repo_desc = repo_info.get("description", "") if repo_info else ""

          # ─── Update CSV ───
          os.makedirs("data", exist_ok=True)
          csv_path = "data/traffic.csv"
          file_exists = os.path.exists(csv_path)

          with open(csv_path, "a", newline="") as f:
              writer = csv.writer(f)
              if not file_exists:
                  writer.writerow(["date", "views", "unique_views", "clones", "unique_clones"])
              writer.writerow([today, views_count, views_uniques, clones_count, clones_uniques])

          # ─── Read historical CSV ───
          dates, v_hist, uv_hist, c_hist, uc_hist = [], [], [], [], []
          total_views_all = 0
          total_clones_all = 0
          with open(csv_path, "r") as f:
              reader = csv.DictReader(f)
              for row in reader:
                  dates.append(row["date"])
                  v = int(row["views"])
                  uv = int(row["unique_views"])
                  c = int(row["clones"])
                  uc = int(row["unique_clones"])
                  v_hist.append(v)
                  uv_hist.append(uv)
                  c_hist.append(c)
                  uc_hist.append(uc)
                  total_views_all += v
                  total_clones_all += c

          # Keep last 90 entries for charts
          def last90(lst):
              return lst[-90:] if len(lst) > 90 else lst

          dates90 = last90(dates)
          v90 = last90(v_hist)
          uv90 = last90(uv_hist)
          c90 = last90(c_hist)
          uc90 = last90(uc_hist)

          # ─── Process referrers & paths ───
          top_refs = sorted(referrers, key=lambda x: x.get("count", 0), reverse=True)[:10]
          top_paths = sorted(paths, key=lambda x: x.get("count", 0), reverse=True)[:10]

          ref_labels = [r.get("referrer", "Unknown").replace("https://", "").replace("http://", "").rstrip("/")[:60] for r in top_refs]
          ref_counts = [r.get("count", 0) for r in top_refs]
          ref_uniques = [r.get("uniques", 0) for r in top_refs]

          path_labels = [p.get("path", "/")[:50] for p in top_paths]
          path_counts = [p.get("count", 0) for p in top_paths]
          path_uniques = [p.get("uniques", 0) for p in top_paths]
          path_titles = [p.get("title", "")[:40] for p in top_paths]

          # ─── Generate HTML ───
          html = f"""<!DOCTYPE html>
          <html lang="zh">
          <head>
          <meta charset="utf-8">
          <meta name="viewport" content="width=device-width, initial-scale=1.0">
          <title>Traffic · {repo_name}</title>
          <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
          <style>
          *, *::before, *::after {{ box-sizing: border-box; margin: 0; padding: 0; }}
          body {{
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
            line-height: 1.6;
          }}
          .container {{ max-width: 1000px; margin: 0 auto; padding: 2rem 1.5rem; }}
          
          /* Header */
          .header {{
            text-align: center;
            margin-bottom: 2.5rem;
            padding: 2.5rem 2rem;
            background: linear-gradient(135deg, #161b22 0%, #1c2333 100%);
            border-radius: 16px;
            border: 1px solid #30363d;
          }}
          .header h1 {{ font-size: 2rem; font-weight: 700; background: linear-gradient(135deg, #58a6ff, #bc8cff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }}
          .header .repo {{ font-size: 1.1rem; color: #8b949e; margin-top: 0.5rem; }}
          .header .desc {{ font-size: 0.95rem; color: #6e7681; margin-top: 0.3rem; }}
          .header .updated {{ font-size: 0.8rem; color: #484f58; margin-top: 0.8rem; }}
          
          /* Summary Cards */
          .summary {{
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
          }}
          .card {{
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.25rem 1.5rem;
            transition: border-color 0.2s, transform 0.2s;
          }}
          .card:hover {{ border-color: #58a6ff; transform: translateY(-2px); }}
          .card .icon {{ font-size: 1.5rem; margin-bottom: 0.5rem; }}
          .card .label {{ font-size: 0.8rem; color: #8b949e; text-transform: uppercase; letter-spacing: 0.5px; }}
          .card .value {{ font-size: 1.8rem; font-weight: 700; color: #e6edf3; margin: 0.25rem 0; }}
          .card .sub {{ font-size: 0.8rem; color: #6e7681; }}
          
          /* Chart sections */
          .section {{
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
          }}
          .section h2 {{
            font-size: 1.15rem;
            font-weight: 600;
            color: #e6edf3;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
          }}
          .chart-wrap {{ position: relative; width: 100%; }}
          .chart-wrap canvas {{ max-height: 320px; }}
          
          /* Two column layout */
          .two-col {{
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
          }}
          @media (max-width: 700px) {{
            .two-col {{ grid-template-columns: 1fr; }}
            .summary {{ grid-template-columns: repeat(2, 1fr); }}
          }}
          
          /* Table */
          .data-table {{
            width: 100%;
            border-collapse: collapse;
            font-size: 0.85rem;
            margin-top: 0.5rem;
          }}
          .data-table th {{
            text-align: left;
            padding: 0.6rem 0.8rem;
            color: #8b949e;
            font-weight: 600;
            border-bottom: 1px solid #21262d;
            font-size: 0.78rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
          }}
          .data-table td {{
            padding: 0.5rem 0.8rem;
            border-bottom: 1px solid #21262d;
            color: #c9d1d9;
          }}
          .data-table tr:hover td {{ background: #1c2128; }}
          .data-table .num {{ text-align: right; font-variant-numeric: tabular-nums; }}
          
          details {{
            margin-top: 1rem;
          }}
          details summary {{
            cursor: pointer;
            color: #58a6ff;
            font-size: 0.9rem;
            font-weight: 500;
            user-select: none;
          }}
          details summary:hover {{ color: #79c0ff; }}
          
          .footer {{
            text-align: center;
            font-size: 0.8rem;
            color: #484f58;
            margin-top: 2.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid #21262d;
          }}
          .footer a {{ color: #58a6ff; text-decoration: none; }}
          .footer a:hover {{ text-decoration: underline; }}
          </style>
          </head>
          <body>
          <div class="container">
          
          <!-- Header -->
          <div class="header">
            <h1>📊 Repository Traffic Dashboard</h1>
            <div class="repo">{repo_name}</div>
            {f'<div class="desc">{repo_desc}</div>' if repo_desc else ''}
            <div class="updated">🕐 最后更新：{today}（每日自动刷新）</div>
          </div>
          
          <!-- Summary cards -->
          <div class="summary">
            <div class="card">
              <div class="icon">👁️</div>
              <div class="label">今日浏览</div>
              <div class="value">{views_count:,}</div>
              <div class="sub">独立访客 {views_uniques:,}</div>
            </div>
            <div class="card">
              <div class="icon">📥</div>
              <div class="label">今日克隆</div>
              <div class="value">{clones_count:,}</div>
              <div class="sub">独立用户 {clones_uniques:,}</div>
            </div>
            <div class="card">
              <div class="icon">⭐</div>
              <div class="label">Star 数</div>
              <div class="value">{stars:,}</div>
              <div class="sub">全部历史累计</div>
            </div>
            <div class="card">
              <div class="icon">🍴</div>
              <div class="label">Fork 数</div>
              <div class="value">{forks:,}</div>
              <div class="sub">全部历史累计</div>
            </div>
            <div class="card">
              <div class="icon">📈</div>
              <div class="label">总浏览量</div>
              <div class="value">{total_views_all:,}</div>
              <div class="sub">自统计以来累计</div>
            </div>
            <div class="card">
              <div class="icon">📦</div>
              <div class="label">总克隆量</div>
              <div class="value">{total_clones_all:,}</div>
              <div class="sub">自统计以来累计</div>
            </div>
          </div>
          
          <!-- Views trend -->
          <div class="section">
            <h2>👁️ 浏览量趋势（近 90 天）</h2>
            <div class="chart-wrap"><canvas id="viewsChart"></canvas></div>
          </div>
          
          <!-- Clones trend -->
          <div class="section">
            <h2>📥 克隆量趋势（近 90 天）</h2>
            <div class="chart-wrap"><canvas id="clonesChart"></canvas></div>
          </div>
          
          <!-- Referrers & Paths -->
          <div class="two-col">
            <div class="section">
              <h2>🌐 热门来源</h2>
              <div class="chart-wrap"><canvas id="refChart"></canvas></div>
            </div>
            <div class="section">
              <h2>📄 热门页面</h2>
              <div class="chart-wrap"><canvas id="pathChart"></canvas></div>
            </div>
          </div>
          
          <!-- Raw data table -->
          <div class="section">
            <h2>📋 原始数据</h2>
            <details>
              <summary>展开查看逐日数据（近 30 天）</summary>
              <div style="overflow-x:auto;margin-top:0.5rem;">
                <table class="data-table">
                  <thead><tr><th>日期</th><th class="num">Views</th><th class="num">独立访客</th><th class="num">Clones</th><th class="num">独立克隆</th></tr></thead>
                  <tbody>
          """
          # Add last 30 rows to table
          for i in range(max(0, len(dates)-30), len(dates)):
              html += f"<tr><td>{dates[i]}</td><td class='num'>{v_hist[i]:,}</td><td class='num'>{uv_hist[i]:,}</td><td class='num'>{c_hist[i]:,}</td><td class='num'>{uc_hist[i]:,}</td></tr>"

          html += f"""</tbody></table></div></details></div>

          <div class="footer">
            Powered by <a href="https://github.com/{repo}" target="_blank">GitHub Actions</a> · 数据每日 UTC 0:00 自动更新
          </div>
          </div>

          <script>
          // ─── Chart.js Global Settings ───
          Chart.defaults.color = '#8b949e';
          Chart.defaults.borderColor = 'rgba(255,255,255,0.06)';
          Chart.defaults.font.family = "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif";
          
          const gridColor = 'rgba(255,255,255,0.05)';
          const dates = {json.dumps(dates90, ensure_ascii=False)};
          
          function makeLineChart(canvasId, datasets) {{
            return new Chart(document.getElementById(canvasId), {{
              type: 'line',
              data: {{ labels: dates, datasets: datasets }},
              options: {{
                responsive: true,
                maintainAspectRatio: false,
                interaction: {{ mode: 'index', intersect: false }},
                plugins: {{
                  legend: {{ position: 'top', labels: {{ usePointStyle: true, padding: 20, boxWidth: 10 }} }}
                }},
                scales: {{
                  y: {{ beginAtZero: true, grid: {{ color: gridColor }}, ticks: {{ callback: v => v % 1 === 0 ? v : '' }} }},
                  x: {{ grid: {{ color: gridColor }}, ticks: {{ maxTicksLimit: 15, maxRotation: 45 }} }}
                }}
              }}
            }});
          }}
          
          function makeBarChart(canvasId, labels, datasets, horizontal) {{
            return new Chart(document.getElementById(canvasId), {{
              type: 'bar',
              data: {{ labels: labels, datasets: datasets }},
              options: {{
                indexAxis: horizontal ? 'y' : 'x',
                responsive: true,
                maintainAspectRatio: false,
                plugins: {{ legend: {{ display: false }} }},
                scales: {{
                  x: {{ beginAtZero: true, grid: {{ color: gridColor }} }},
                  y: {{ grid: {{ color: gridColor }}, ticks: {{ font: {{ size: 11 }} }} }}
                }}
              }}
            }});
          }}
          
          // ─── Views Chart ───
          makeLineChart('viewsChart', [
            {{
              label: 'Total Views',
              data: {json.dumps(v90)},
              borderColor: '#58a6ff',
              backgroundColor: 'rgba(88,166,255,0.08)',
              fill: true,
              tension: 0.3,
              pointRadius: 1.5,
              pointHoverRadius: 5,
              borderWidth: 2
            }},
            {{
              label: 'Unique Visitors',
              data: {json.dumps(uv90)},
              borderColor: '#3fb950',
              backgroundColor: 'rgba(63,185,80,0.05)',
              fill: true,
              tension: 0.3,
              pointRadius: 1.5,
              pointHoverRadius: 5,
              borderWidth: 2,
              borderDash: [6, 3]
            }}
          ]);
          
          // ─── Clones Chart ───
          makeLineChart('clonesChart', [
            {{
              label: 'Total Clones',
              data: {json.dumps(c90)},
              borderColor: '#d2a8ff',
              backgroundColor: 'rgba(210,168,255,0.08)',
              fill: true,
              tension: 0.3,
              pointRadius: 1.5,
              pointHoverRadius: 5,
              borderWidth: 2
            }},
            {{
              label: 'Unique Cloners',
              data: {json.dumps(uc90)},
              borderColor: '#f0883e',
              backgroundColor: 'rgba(240,136,62,0.05)',
              fill: true,
              tension: 0.3,
              pointRadius: 1.5,
              pointHoverRadius: 5,
              borderWidth: 2,
              borderDash: [6, 3]
            }}
          ]);
          
          // ─── Referrers Chart ───
          makeBarChart('refChart', {json.dumps(ref_labels, ensure_ascii=False)}, [
            {{
              label: 'Views',
              data: {json.dumps(ref_counts)},
              backgroundColor: 'rgba(88,166,255,0.65)',
              borderRadius: 4,
              borderColor: '#58a6ff',
              borderWidth: 1
            }},
            {{
              label: 'Unique',
              data: {json.dumps(ref_uniques)},
              backgroundColor: 'rgba(63,185,80,0.5)',
              borderRadius: 4,
              borderColor: '#3fb950',
              borderWidth: 1
            }}
          ], true);
          
          // ─── Paths Chart ───
          makeBarChart('pathChart', {json.dumps(path_labels, ensure_ascii=False)}, [
            {{
              label: 'Views',
              data: {json.dumps(path_counts)},
              backgroundColor: 'rgba(188,140,255,0.65)',
              borderRadius: 4,
              borderColor: '#bc8cff',
              borderWidth: 1
            }},
            {{
              label: 'Unique',
              data: {json.dumps(path_uniques)},
              backgroundColor: 'rgba(240,136,62,0.5)',
              borderRadius: 4,
              borderColor: '#f0883e',
              borderWidth: 1
            }}
          ], true);
          </script>
          </body>
          </html>"""

          # Write HTML
          with open("data/index.html", "w", encoding="utf-8") as f:
              f.write(html)

          print(f"✅ Dashboard generated!")
          print(f"   Views today: {views_count} ({views_uniques} unique)")
          print(f"   Clones today: {clones_count} ({clones_uniques} unique)")
          print(f"   Stars: {stars} | Forks: {forks}")
          print(f"   Referrers: {len(top_refs)} | Paths: {len(top_paths)}")
          print(f"   Total historical: {total_views_all} views, {total_clones_all} clones")
          PYEOF

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/traffic.csv data/index.html
          git diff --staged --quiet || git commit -m "📊 Update dashboard: $(date +%Y-%m-%d)"
          git push
